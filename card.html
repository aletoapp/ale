<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="./SEM-LIMITES-2_files/css2" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Barlow', sans-serif; }

  .showcase {
    position: relative;
    width: 1080px;
    aspect-ratio: 1080 / 1350;
    overflow: hidden;
    background: #111;
  }

  .bike-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center bottom;
    filter: contrast(1.05) saturate(0.9);
  }

  /* dramatic dark overlay — heavier at top, light at bottom so bike shows */
  .overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        rgba(0,0,0,0.88) 0%,
        rgba(0,0,0,0.60) 35%,
        rgba(0,0,0,0.15) 60%,
        rgba(0,0,0,0.05) 100%
      );
  }

  /* thin accent line */
  .accent-line {
    position: absolute;
    top: 0;
    left: 72px;
    width: 3px;
    height: 420px;
    background: #F5C400;
  }

  /* brand mark top-left */
  .brand {
    position: absolute;
    top: 60px;
    left: 100px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 52px;
    letter-spacing: 4px;
    color: #fff;
    text-transform: lowercase;
  }
  .brand em { font-style: italic; color: #F5C400; }

  /* tagline */
  .tagline {
    position: absolute;
    top: 126px;
    left: 100px;
    font-family: 'Barlow', sans-serif;
    font-weight: 500;
    font-size: 26px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  /* BIG HEADLINE on the wall */
  .headline {
    position: absolute;
    top: 200px;
    left: 100px;
    right: 420px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 148px;
    line-height: 0.9;
    letter-spacing: -2px;
    text-transform: uppercase;
    color: #fff;
    mix-blend-mode: normal;
  }
  .headline .accent { color: #F5C400; }
  .headline .outline {
    -webkit-text-stroke: 2px rgba(255,255,255,0.25);
    color: transparent;
  }

  /* feature pills — right side of headline */
  .features {
    position: absolute;
    top: 68px;
    right: 72px;
    width: 470px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(245,196,0,0.18);
    padding: 28px 30px;
    backdrop-filter: blur(6px);
  }

  /* thin top accent on the panel */
  .features::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, #F5C400, transparent);
  }

  .feat {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 18px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .feat:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .feat:first-child {
    padding-top: 0;
  }

  .feat-icon {
    width: 44px;
    height: 44px;
    border: 1.5px solid rgba(245,196,0,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: rgba(245,196,0,0.06);
  }

  .feat-icon svg {
    width: 45px;
    height: 45px;
  }

  .feat-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .feat-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 75px;
    letter-spacing: 1px;
    color: #F5C400;
    line-height: 1;
	letter-spacing: 5px;
  }

  .feat-label {
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    font-size: 30px;
    letter-spacing: 7px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  /* ── BADGE: 0km Montada ── */
  .badge-fabrica {
    position: relative;
    margin-top: 22px;
    padding: 14px 20px;
    background: rgba(245,196,0,0.08);
    border: 1.5px solid rgba(245,196,0,0.55);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .badge-fabrica::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #F5C400 60%, transparent);
  }

  .badge-fabrica-icon {
    width: 36px;
    height: 36px;
    background: rgba(245,196,0,0.12);
    border: 1.5px solid rgba(245,196,0,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .badge-fabrica-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .badge-fabrica-km {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: 34px;
    letter-spacing: 7px;
    color: #F5C400;
    line-height: 1;
    text-transform: uppercase;
  }

  .badge-fabrica-sub {
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.90);
  }

  /* ── CONSULTOR STRIP ── */
  .consultor-strip {
    position: absolute;
    bottom: 10px;
    left: 100px;
    right: 80px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(245,196,0,0.22);
    backdrop-filter: blur(6px);
    padding: 12px 28px;
  }

  .consultor-strip::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #F5C400, transparent);
  }

  .consultor-icon {
    width: 40px;
    height: 40px;
    background: rgba(245,196,0,0.1);
    border: 1.5px solid rgba(245,196,0,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .consultor-label {
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    flex-shrink: 0;
  }

  .consultor-divider {
    width: 1px;
    height: 32px;
    background: rgba(245,196,0,0.3);
    flex-shrink: 0;
  }

  .consultor-nome {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 500;
    font-size: 30px;
    letter-spacing: 7px;
    text-transform: uppercase;
    color: #fff;
    flex-shrink: 0;
  }

  .consultor-fone {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 5px;
    color: #FFF;
    margin-left: auto;
  }

  /* bottom horizontal rule */
  .bottom-bar {
    position: absolute;
    bottom: 38px;
    left: 100px;
    right: 80px;
    height: 1px;
    background: linear-gradient(90deg, rgba(245,196,0,0.7), transparent);
  }

  /* small counter bottom right */
  .counter {
    position: absolute;
    bottom: 14px;
    right: 80px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }
</style>
</head>
